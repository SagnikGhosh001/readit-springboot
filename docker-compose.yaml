version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "8000:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - server

    networks:
      - backend
  server:
    build: .
    deploy:
      replicas: 3
    expose:
      - "8000"
    environment:
      READIT_MONGO_URI: mongodb://mongo:27017/readit
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      - mongo
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge