spring:
  application:
    name: readit
  mongodb:
    uri: ${READIT_MONGO_URI:mongodb://localhost:27017/test}
  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${GITHUB_CLIENT_ID}
            clientSecret: ${GITHUB_CLIENT_SECRET}

server:
  port: 8000
unprotected:
  endpoints: /swagger-ui.html,/swagger-ui/**,/v3/api-docs/**,/swagger-resources/**,/actuator/**

security:
  jwt:
    secret-key: 9a4f2c8d3b7a1e6f5c8d9a0b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d
    expiration-time: 3600000

management:
  endpoints:
    web:
      exposure:
        include: "*"
